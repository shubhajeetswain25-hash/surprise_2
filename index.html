<body>
    <div class="lock-screen">
        <h1 class="lock">🔒</h1>

            <span class="dot"></span>
                
            <span class="dot"></span>
                
            <span class="dot"></span>
               
            <span class="dot"></span>
                
            <span class="dot"></span>
                
            <span class="dot"></span>
            
        </div>
           
<div class="numpad">

    <button class="number">2</button>
            
    <button class="number">3</button>

    <button class="number">0</button>
            
    <button class="enter">🔓</button>
    
</div>
<div class = "status-message">
    
</div>


    
</div>
